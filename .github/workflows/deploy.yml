name: CI & Deploy

# Dogfoods the mechanism (principle 05): conventions are checked in CI, and a
# fresh build stamps runtimeConfig.public.buildDate so dateModified tracks reality.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   token with Workers Scripts:Edit + the zone for
#                          context-architecture.dev (Workers Routes / DNS as needed)
#   CLOUDFLARE_ACCOUNT_ID  the Cloudflare account id that owns the Worker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# A newer run for the same ref supersedes an in-flight one.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, build, deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Conventions are codified, not tribal — the machine checks them.
      - name: Lint (oxlint + oxlint-tailwindcss)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Prerender the static site to .output/public (SSG). The GA4 Measurement ID
      # (repo variable NUXT_PUBLIC_GA_ID, optional) is baked into the static build
      # here; empty means analytics stays off.
      - name: Build
        run: pnpm generate
        env:
          NUXT_PUBLIC_GA_ID: ${{ vars.NUXT_PUBLIC_GA_ID }}

      # Deploy only on push to main; PRs run the checks above but never deploy.
      - name: Deploy to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
