name: CI & Deploy

# Dogfoods the mechanism (principle 07): conventions are checked in CI, and a
# fresh build stamps runtimeConfig.public.buildDate so dateModified tracks reality.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   token with Workers Scripts:Edit + the zone for
#                          context-architecture.dev (Workers Routes / DNS as needed)
#   CLOUDFLARE_ACCOUNT_ID  the Cloudflare account id that owns the Worker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# A newer run for the same ref supersedes an in-flight one.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, build, deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Conventions are codified, not tribal: the machine checks them.
      - name: Lint (oxlint + oxlint-tailwindcss)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Prerender the static site to .output/public (SSG). The GA4 Measurement ID
      # (repo variable NUXT_PUBLIC_GA_ID, optional) is baked into the static build
      # here; empty means analytics stays off.
      - name: Build
        run: pnpm generate
        env:
          NUXT_PUBLIC_GA_ID: ${{ vars.NUXT_PUBLIC_GA_ID }}

      # The repo's own verification surface (principle 09): doc references resolve,
      # EN/ES parity holds, prose conventions hold, the lint rules are not weakened,
      # and the prerendered HTML carries the content without JavaScript. Runs after
      # the build so the no-JS test can read .output/public.
      - name: Test
        run: pnpm test

      # Deploy only on push to main; PRs run the checks above but never deploy.
      - name: Deploy to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Tell IndexNow (Bing, Yandex, Naver, Seznam, Yep, and Bing feeds AI search)
      # that the published URLs changed, so they re-crawl promptly. Google does not
      # participate. The key is the public file public/<key>.txt; the URL list comes
      # from the generated sitemap. Best-effort: a failed ping never fails the deploy.
      - name: Ping IndexNow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          key="$(basename "$(ls public/*.txt | head -1)" .txt)"
          urls="$(grep -ohE '<loc>[^<]+</loc>' .output/public/__sitemap__/*.xml | sed -E 's:</?loc>::g' | sort -u)"
          body="$(jq -n \
            --arg host 'context-architecture.dev' \
            --arg key "$key" \
            --arg keyLocation "https://context-architecture.dev/$key.txt" \
            --argjson urlList "$(printf '%s\n' "$urls" | jq -R . | jq -s 'map(select(length > 0))')" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')"
          echo "Submitting to IndexNow:"; echo "$urls"
          curl -sS -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data "$body" -w '\nIndexNow HTTP %{http_code}\n'
